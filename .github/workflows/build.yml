name: Build Optimized Artifacts

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  # schedule:
  #   - cron: '0 0 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build-arch-pkg:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2

    - name: Update system and install dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm base-devel git cmake cuda curl nvidia-utils nccl openssl
      
    - name: Prepare build environment
      run: |
        useradd -m -G wheel builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        chown -R builder:builder $GITHUB_WORKSPACE

    - name: Build Package
      run: |
        su builder -c "cd $GITHUB_WORKSPACE && makepkg -s --noconfirm"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4.5.0
      with:
        name: ik-llama.cpp-zen5-pkg
        path: ./*.pkg.tar.zst
        retention-days: 7

  build-docker-image:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2

    - name: Log in to the Container registry
      uses: docker/login-action@v3.3.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3.8.0

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5.6.1
      with:
        images: ghcr.io/${{ github.repository_owner }}/ik_llama.cpp-zen5
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha

    - name: Build and push Docker image
      uses: docker/build-push-action@v6.10.0
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
